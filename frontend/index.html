<!DOCTYPE html>
<html>
<head>
    <title>AI Stock Research</title>
</head>
<body>

    <h1>AI Stock Research</h1>

    <input type="text" id="symbol" placeholder="Enter stock symbol">
    <button onclick="getStock()">Search</button>

    <h2>Result:</h2>
    <pre id="result"></pre>

    <script>
        async function getStock() {
            const symbol = document.getElementById("symbol").value;

            const response = await fetch(`http://127.0.0.1:8001/ai-stock-summary?symbol=${symbol}`);
            const data = await response.json();

            document.getElementById("result").innerText = JSON.stringify(data, null, 2);
        }
    </script>

</body>
</html>
